<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sign in — iBuddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-900: #1B5481;
    --brand-800: #225F90;
    --brand-700: #2D7AB8;
    --brand-500: #499AD4;
    --brand-300: #8FC0E0;
    --brand-100: #D8ECF7;
    --brand-50:  #EEF6FB;
    --brand-25:  #F7FAFD;

    --ink-900: #0F172A;
    --ink-700: #334155;
    --ink-500: #64748B;
    --ink-400: #94A3B8;
    --ink-300: #CBD5E1;

    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --line: #EEF0F3;
    --line-strong: #E2E5EB;

    --ok: #10B981;
    --crit: #F43F5E;
    --crit-soft: #FFF1F2;
    --crit-ink: #BE123C;

    --r-md: 16px;
    --r-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow-md: 0 8px 24px rgba(15,23,42,.06), 0 2px 6px rgba(15,23,42,.04);
    --shadow-lg: 0 24px 60px rgba(15,23,42,.10), 0 4px 12px rgba(15,23,42,.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color: var(--ink-900);
    font-size: 14.5px;
    line-height: 1.5;
    font-weight: 500;
    letter-spacing: -.005em;
    -webkit-font-smoothing: antialiased;
    background: #EEF6FB;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input { font: inherit; color: inherit; }
  a { color: var(--brand-700); text-decoration: none; font-weight: 600; }
  a:hover { color: var(--brand-900); }

  /* Page layout */
  .page {
    position: relative;
    width: 100%; height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  /* Decorative ambient mesh */
  .mesh {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 18% 22%, rgba(73,154,212,.32), transparent 60%),
      radial-gradient(ellipse 55% 45% at 82% 80%, rgba(45,122,184,.28), transparent 65%),
      radial-gradient(ellipse 70% 50% at 50% 110%, rgba(143,192,224,.40), transparent 60%),
      linear-gradient(180deg, #F7FAFD 0%, #E5F0F8 100%);
  }
  .grid-pattern {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: .55;
    background-image:
      linear-gradient(rgba(45,122,184,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,122,184,.06) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent 80%);
  }
  /* Slowly drifting brand-blue orbs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  }
  .blob.a { top: -120px; left: -80px;   width: 380px; height: 380px; background: #8FC0E0; opacity: .55; animation: drift1 18s ease-in-out infinite; }
  .blob.b { bottom: -160px; right: -120px; width: 460px; height: 460px; background: #499AD4; opacity: .35; animation: drift2 22s ease-in-out infinite; }
  .blob.c { top: 50%; left: 65%;        width: 260px; height: 260px; background: #2D7AB8; opacity: .18; animation: drift3 16s ease-in-out infinite; }
  @keyframes drift1 {
    0%,100% { transform: translate(0,0); }
    50%     { transform: translate(40px,30px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0); }
    50%     { transform: translate(-30px,-20px); }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(-50px,30px) scale(1.1); }
  }

  /* Top-left brand */
  .brand-bar {
    position: absolute;
    top: 28px; left: 32px;
    display: flex; align-items: center; gap: 10px;
    z-index: 2;
  }
  .brand-logo { height: 36px; width: auto; display: block; }
  .brand-name {
    font-size: 18px; font-weight: 700; letter-spacing: -.018em;
    color: var(--brand-700);
  }

  /* Footer */
  .foot {
    position: absolute;
    bottom: 24px; left: 0; right: 0;
    display: flex; justify-content: flex-end;
    padding: 0 32px;
    color: var(--ink-400);
    font-size: 12.5px;
    font-weight: 500;
    z-index: 2;
  }
  .foot a { color: var(--ink-500); font-weight: 500; }
  .foot a:hover { color: var(--ink-900); }
  .foot-links { display: flex; gap: 18px; }

  /* Login card */
  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    padding: 36px;
    z-index: 1;
    animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-logo {
    height: 40px;
    margin: 0 0 28px;
    display: flex;
    align-items: center;
  }
  .card-logo img { height: 100%; width: auto; display: block; }

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.028em;
    margin: 0 0 8px;
  }
  .sub {
    color: var(--ink-500);
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 28px;
  }

  /* Form */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-700);
    margin-bottom: 7px;
    letter-spacing: -.005em;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap svg.lead {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-400);
    pointer-events: none;
  }
  .input {
    width: 100%;
    height: 46px;
    padding: 0 14px 0 42px;
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    background: #FBFCFD;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-900);
    transition: border-color .15s, box-shadow .15s, background .15s;
    outline: none;
  }
  .input::placeholder { color: var(--ink-400); font-weight: 500; }
  .input:focus {
    border-color: var(--brand-500);
    background: white;
    box-shadow: 0 0 0 4px rgba(73,154,212,.14);
  }
  .input.has-toggle { padding-right: 48px; }
  .toggle-eye {
    position: absolute;
    right: 8px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px;
    border-radius: 8px;
    display: grid; place-items: center;
    color: var(--ink-400);
    transition: color .12s, background .12s;
  }
  .toggle-eye:hover { color: var(--brand-700); background: var(--brand-50); }

  .row-between {
    display: flex; align-items: center; justify-content: space-between;
    margin: 6px 0 22px;
    font-size: 13px;
  }
  .check {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink-700);
    font-weight: 500;
    cursor: pointer;
    user-select: none;
  }
  .check input { position: absolute; opacity: 0; pointer-events: none; }
  .check-box {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--line-strong);
    background: white;
    display: grid; place-items: center;
    transition: background .12s, border-color .12s;
  }
  .check input:checked + .check-box {
    background: var(--brand-700);
    border-color: var(--brand-700);
  }
  .check-box svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity .12s; }
  .check input:checked + .check-box svg { opacity: 1; }

  .btn-primary {
    width: 100%;
    height: 48px;
    border-radius: 12px;
    background: var(--brand-700);
    color: white;
    font-weight: 700;
    font-size: 14.5px;
    letter-spacing: -.005em;
    transition: background .12s, transform .08s, box-shadow .12s;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(45,122,184,.24);
  }
  .btn-primary:hover { background: var(--brand-800); box-shadow: 0 6px 18px rgba(45,122,184,.32); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary.loading { pointer-events: none; opacity: .85; }
  .btn-primary .spinner {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: white;
    animation: spin .7s linear infinite;
    display: none;
  }
  .btn-primary.loading .spinner { display: inline-block; }
  .btn-primary.loading .label { opacity: .8; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    color: var(--ink-400);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .btn-secondary {
    width: 100%;
    height: 46px;
    border-radius: 12px;
    border: 1px solid var(--line-strong);
    background: white;
    color: var(--ink-700);
    font-weight: 600;
    font-size: 14px;
    transition: background .12s, border-color .12s;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
  }
  .btn-secondary:hover { background: var(--brand-25); border-color: var(--ink-300); }

  .signup {
    margin-top: 24px;
    text-align: center;
    font-size: 13.5px;
    color: var(--ink-500);
  }

  .error {
    background: var(--crit-soft);
    color: var(--crit-ink);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error.show { display: flex; animation: shake .35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .hidden { display: none !important; }

  @media (max-width: 520px) {
    .brand-bar { top: 18px; left: 18px; }
    .card { padding: 28px 22px; }
    .foot { padding: 0 18px; flex-direction: column; gap: 6px; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="mesh"></div>
    <div class="grid-pattern"></div>
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="blob c"></div>

    <div class="brand-bar hidden">
      <img class="brand-logo" src="assets/ibuddy-logo.png" alt="iBuddy" />
    </div>

    <form class="card" id="login-form" novalidate>
      <div class="card-logo">
        <img src="assets/ibuddy-logo.png" alt="iBuddy" />
      </div>

      <h1>Welcome back</h1>
      <p class="sub">Sign in to your iBuddy fleet dashboard</p>

      <div class="error" id="error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/><circle cx="12" cy="16.5" r=".5" fill="currentColor"/></svg>
        <span id="error-text">Incorrect email or password</span>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg class="lead" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden>
            <rect x="3" y="5" width="18" height="14" rx="2.5"/>
            <path d="m3 7 9 6 9-6"/>
          </svg>
          <input id="email" type="email" class="input" placeholder="dave@ibuddy.co.uk" value="dave.bell@ibuddy.co.uk" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="lead" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden>
            <rect x="3" y="11" width="18" height="11" rx="2.5"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="password" type="password" class="input has-toggle" placeholder="••••••••" value="ibuddy2026" autocomplete="current-password" />
          <button type="button" class="toggle-eye" id="toggle-eye" aria-label="Show password">
            <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M2 12s3.5-7 10-7c2.3 0 4.3.9 6 2.1"/><path d="M22 12s-3.5 7-10 7c-2.3 0-4.3-.9-6-2.1"/><path d="m4 4 16 16"/></svg>
          </button>
        </div>
      </div>

      <div class="row-between">
        <label class="check">
          <input type="checkbox" id="remember" checked />
          <span class="check-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-11"/></svg>
          </span>
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submit">
        <span class="spinner"></span>
        <span class="label">Sign in</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2.5"/><path d="M16 14a4 4 0 1 1-8 0 4 4 0 0 1 8 0"/><path d="M9 6V4h6v2"/></svg>
        Sign in with SSO
      </button>

      <div class="signup">
        New to iBuddy? <a href="#">Request a demo</a>
      </div>
    </form>

    <div class="foot">
      <div class="foot-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Help</a>
      </div>
    </div>
  </div>

<script>
  // Password reveal toggle
  const pw = document.getElementById('password');
  const toggle = document.getElementById('toggle-eye');
  const eyeOpen = document.getElementById('eye-open');
  const eyeClosed = document.getElementById('eye-closed');
  toggle.addEventListener('click', () => {
    const showing = pw.type === 'text';
    pw.type = showing ? 'password' : 'text';
    eyeOpen.style.display = showing ? 'block' : 'none';
    eyeClosed.style.display = showing ? 'none' : 'block';
    toggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });

  // Submit — simulate auth then route to dashboard
  const form = document.getElementById('login-form');
  const btn = document.getElementById('submit');
  const errorBox = document.getElementById('error');
  const errorText = document.getElementById('error-text');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    errorBox.classList.remove('show');

    if (!email || !password) {
      errorText.textContent = 'Please enter your email and password';
      errorBox.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    sessionStorage.setItem('ibuddy.justSignedIn', '1');
    setTimeout(() => {
      window.location.href = 'Fleet Dashboard.html';
    }, 900);
  });
</script>
</body>
</html>
